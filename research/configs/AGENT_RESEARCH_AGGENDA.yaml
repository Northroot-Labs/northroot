# northroot_research_task_v0.1.yaml
version: 0.1
namespace: northroot.research.delta_compute

task:
  name: "Delta & Incremental Compute Research"
  description: >
    Explore, analyze, and map the frontier of delta and incremental compute,
    focusing on reusable computation, proof-based verification, and near-term
    FinOps and data-engineering applications. Produce actionable findings that
    guide Northroot's engineering and pilot rollout priorities.

context:
  organization: "Northroot Labs"
  framework: "Proof Geometry / Receipts / Delta Compute"
  summary: >
    Northroot builds a verifiable execution substrate where compute steps emit
    canonical receipts. The goal of delta compute is to reuse previously verified
    work across runs and record economic justification (J, α, C_id, C_comp)
    in proofs. The research agent will identify where this concept can deliver
    measurable savings, which operators and domains yield the highest ROI,
    and what mathematical, technical, and market research supports it.

objectives:
  conceptual:
    - "Identify mathematical strategies for partial computation reuse (monoids, semirings, differential dataflow)."
    - "Define operator incrementality (α) and economic break-even thresholds for reuse decisions."
    - "Study algebraic or probabilistic overlap metrics (Jaccard, MinHash, weighted similarity)."
  technical:
    - "Survey open-source frameworks for incremental compute and DAG caching (Bazel, DVC, Dagster, Ray, Differential Dataflow, Delta Lake)."
    - "Benchmark chunking and sketching algorithms (Rabin, FastCDC, MinHash, HLL)."
    - "Evaluate canonicalization efficiency (JSON vs CBOR) for receipt and proof storage."
    - "Identify operators best suited for delta reuse: group-by, join, partition, aggregate."
  applied:
    - "Find high-ROI domains for delta compute (FinOps, ETL, AI agent pipelines, ML feature stores)."
    - "Quantify potential compute/time/cost savings per domain (target 25–40% reduction)."
    - "Map integration paths: SDK hooks, MCP client embedding, trace observation."
  market:
    - "Estimate market size and spend for FinOps and ETL workflows."
    - "Survey competitors and adjacent systems; identify white-space for verifiable reuse proofs."
  frontier:
    - "Explore cross-organizational delta compute and privacy-preserving reuse mechanisms (MPC, federated, ZK)."
    - "Assess viability of AI-driven delta strategy selection (learned cost models)."
    - "Evaluate feasibility of verifiable compute proofs in TEEs or ZKP systems."

deliverables:
  - name: "landscape_brief"
    type: "markdown"
    description: "Overview of delta/incremental compute research, frameworks, and trends."
  - name: "applied_use_case_sheets"
    type: "markdown"
    description: "One-pager per target domain outlining pain points, reuse opportunities, expected ROI."
  - name: "operator_strategy_table"
    type: "table"
    description: "Operators ranked by incrementality factor α and economic savings potential."
  - name: "integration_notes"
    type: "markdown"
    description: "Recommended SDK/API integration strategies for real-world systems."
  - name: "proof_synergy_memo"
    type: "markdown"
    description: "How proof geometry complements and verifies reuse in delta compute."
  - name: "white_space_matrix"
    type: "table"
    description: "2×2 grid of (market pain vs. reuse potential) to highlight near-term opportunities."
  - name: "bibliography"
    type: "markdown"
    description: "Cited papers, repos, and references used during research."

methodology:
  - "Perform literature review and open-source analysis."
  - "Collect quantitative metrics from case studies (FinOps, ETL, ML)."
  - "Prototype delta-aware workloads and measure overlap J and α."
  - "Document proofs emitted by prototype for reproducibility."
  - "Benchmark canonicalization (JSON vs CBOR) for performance and determinism."
  - "Record findings as receipts with metadata linking to operator shapes."

key_terms:
  - delta_compute
  - incremental_compute
  - overlap_J
  - alpha_incrementality
  - spend_justification
  - proof_receipt
  - canonicalization
  - chunking
  - sketching
  - reuse_economics
  - FinOps
  - ETL
  - federated_compute
  - proof_of_reuse

priorities:
  short_term:
    - "FinOps delta compute pilot: cost attribution reuse receipts."
    - "ETL refresh optimization: partition-based reuse."
    - "Proof-bound economics: record delta savings in receipts."
  medium_term:
    - "Canonical schema alignment for heterogeneous data reuse."
    - "Performance baselines for canonicalization and chunking."
  long_term:
    - "Cross-org compute netting and compute credit markets."
    - "AI-driven delta decision agents."

success_metrics:
  - name: "domain_coverage"
    target: 5
    description: "At least 5 documented domains with clear pain points and reuse potential."
  - name: "high_alpha_operators"
    target: 6
    description: "Operators with measured α ≥ 0.7 and positive ΔC savings."
  - name: "cost_savings_projection"
    target: "25-40%"
    description: "Validated range of potential compute/time savings."
  - name: "open_source_refs"
    target: 15
    description: "Referenced OSS systems or academic papers."
  - name: "new_white_space_areas"
    target: 3
    description: "Distinct underexplored opportunity zones identified."
  - name: "validated_proof_extensions"
    target: 100
    unit: "percent"
    description: "Receipts model remains type-safe and schema-consistent."

reporting:
  format: "markdown"
  frequency: "biweekly"
  guidelines:
    - "Summaries ≤1000 words per topic."
    - "Include explicit citations and URLs."
    - "Flag promising areas for prototype implementation."
    - "Reference spec sections or engine components influenced."
  outputs_dir: "/reports/research/delta_compute/"
  versioning: "git-tracked, reviewed before merge"

agent_guidance:
  tone: "Analytical, concise, evidence-driven."
  depth: "Graduate-level technical rigor, focus on application value."
  bias: "Neutral; prefer practical verifiability over theoretical novelty."
  avoid:
    - "Marketing claims without data"
    - "Unverifiable performance statements"
  prioritize:
    - "Empirical cost models"
    - "Open reproducible references"
    - "Actionable next steps for engineering"

ultimate_goal: >
  Produce a clear, evidence-backed roadmap showing where verifiable delta
  compute can deliver immediate, provable efficiency gains, identify the most
  promising operators and domains for early adoption, and define the research
  direction for cross-org, auditable compute reuse.

findings:
  generated_at: "2025-11-08"
  research_outputs:
    landscape_brief: |
      Differential dataflow shows that once an initial 15 s load completes, incremental graph updates flow through the same scopes in ≈230 µs because only the changed collections are recomputed, yielding >100 000× update-to-recompute ratios for joins and counts when α≈0.99 ([differential_dataflow_readme]). Ray Data generalizes that approach for AI pipelines: its streaming execution moves blocks directly between CPU preprocessing and GPU inference so accelerators stay saturated while multi-modal data is ingested, transformed, and served ([ray_data_docs]). Delta Lake’s change data feed records every `insert/update/delete` with `_change_type`, `_commit_version`, and `_commit_timestamp`, letting ETL jobs and downstream auditors materialize only mutated partitions ([delta_lake_cdf]). FastCDC demonstrates that content-defined chunking can be ≈10× faster than Rabin-based CDC yet retain the same dedup ratio, so chunk-level reuse no longer explodes CPU budgets ([fastcdc_usenix16]). Bazel remote caching, DVC pipelines, and Dagster partitioned assets already rely on deterministic metadata + remote content-addressable stores to share work safely across teams ([bazel_remote_cache], [dvc_readme], [dagster_partition_guide]). Together they confirm that Northroot receipts need three pillars: (1) algebraic overlap metrics (J, MinHash) to score reusability, (2) operator-aware chunking/caching, and (3) deterministic serialization so proofs remain comparable across runs.
    applied_use_case_sheets:
      - domain: "FinOps cost attribution & drift detection"
        pain_points: >
          State-of-practice surveys report that 32% of cloud budgets were wasted in 2022, only 9% of programs feel “mature,” and 82% of orgs rushed to form FinOps teams in the past year—leaders cannot defend recharged spend without verifiable reuse evidence ([cloudzero_finops_stats]).
        reuse_hooks:
          - "Instrument `receipts/schemas/spend_schema.json` with overlap metrics (Jaccard, MinHash sketches) emitted every time a billing graph is replayed with <5 % drift so chargeback tickets cite measurable α."
          - "Pair `crates/northroot-engine/src/strategies/incremental_sum.rs` with a cost-allocation adapter that tags each partition with ΔC and expected reuse window to unlock deterministic FinOps receipts."
        expected_savings: "25–35 % reduction in repeated cost-analytics executions, mirroring reported waste."
        instrumentation: "Track α per billing window by hashing resource tuples and comparing reuse receipts against previous `execution_schema` commits."
        references: ["cloudzero_finops_stats", "minhash_wiki", "differential_dataflow_readme"]
      - domain: "Lakehouse / ETL refresh (Silver → Gold tables)"
        pain_points: >
          Delta Lake’s change data feed exposes precise row-level events so downstream tables and CDC consumers can pull only modified partitions, yet most stacks still rebuild whole DAG levels nightly ([delta_lake_cdf]).
        reuse_hooks:
          - "Add an `operator::cdf_scan` entry in `receipts/src/canonical.rs` that stores `_commit_version`, `_change_type`, and `_commit_timestamp` so Northroot receipts prove which Delta segments were reused."
          - "Teach `receipts/tests/test_drift_detection.rs` to treat missing CDF ranges as drift, forcing only the affected partitions to recompute."
        expected_savings: "30–45 % less compute on nightly ETL refreshes when <40 % of partitions mutate."
        instrumentation: "Record α as `changed_rows / total_rows` per partition and feed it into operator economics."
        references: ["delta_lake_cdf"]
      - domain: "AI agent + RAG data supply chains"
        pain_points: >
          Ray Data keeps GPUs busy by streaming preprocessed blocks directly from CPU workers, yet most RAG/agent stacks still stage intermediates redundantly and lack receipts for reused batches ([ray_data_docs]).
        reuse_hooks:
          - "Wrap Ray Data batch/inference pipelines with Northroot operator manifests so reused CPU transformations (tokenization, embedding chunks) emit receipts before GPU execution."
          - "Cache multi-modal blocks (Parquet, Lance, images) using FastCDC chunk IDs to deduplicate upstream fetches."
        expected_savings: "20–30 % lower GPU idle time and storage egress for agentic workloads."
        instrumentation: "Capture α as `reused_blocks / requested_blocks` and push it into agent receipts via `vectors/method_manifest.json`."
        references: ["ray_data_docs", "fastcdc_usenix16"]
      - domain: "ML feature stores & training backfills"
        pain_points: >
          DVC pipelines rerun only the stages impacted by code/data diffs, but teams rarely surface those cache hits outside ML ops tooling, so feature backfills still block on full recompute approvals ([dvc_readme]).
        reuse_hooks:
          - "Emit receipts every time DVC reports a cached stage hit; serialize the inputs/outputs into Northroot’s canonical schemas so auditors can accept reused features."
          - "Use Dagster partitions to prove that only the requested slices (<100 000 partitions) were recomputed, binding the partition key to α."
        expected_savings: "Acceleration of feature refresh cycles by ≥25 % with deterministic reuse proofing."
        instrumentation: "Store α as `cached_stages / total_stages` and attach partition IDs to receipts."
        references: ["dvc_readme", "dagster_partition_guide"]
      - domain: "Compliance, settlements, and inter-org audit trails"
        pain_points: >
          Receipts must stay canonical across organizations; CBOR’s deterministic encoding forbids indefinite-length items and mandates sorted keys, while RFC 8785’s JSON Canonicalization Scheme enforces deterministic property ordering for hash/sign flows ([cbor_rfc8949], [jcs_rfc8785]).
        reuse_hooks:
          - "Standardize on CBOR deterministic encoding for binary receipts and JCS for JSON mirrors so the same proof roots (`engine/src/commitments.rs`) can be verified cross-org."
          - "Pair chunk-level proofs (FastCDC) with deterministic serialization so third parties can trust reuse attestations without replaying workloads."
        expected_savings: "Immediate elimination of duplicate compliance reruns when partners accept portable receipts."
        instrumentation: "Record serialization mode per receipt and include canonical hash commitments for audit."
        references: ["cbor_rfc8949", "jcs_rfc8785", "fastcdc_usenix16"]
    operator_strategy_table:
      columns: ["operator", "alpha_estimate", "overlap_metric", "economic_signal", "references"]
      rows:
        - operator: "Partitioned sum / incremental aggregation"
          alpha_estimate: 0.85
          overlap_metric: "Per-partition byte reuse derived from incremental_sum strategy outputs"
          economic_signal: "Differential scopes and Northroot’s existing incremental_sum operator only touch partitions that changed, enabling ~5× cost speedups for skewed datasets."
          references: ["differential_dataflow_readme"]
        - operator: "Grouped counts & distincts"
          alpha_estimate: 0.8
          overlap_metric: "Count-change delta compared to previous receipts"
          economic_signal: "When <20 % of keys mutate, incremental distinct counts reuse 80 % of prior work—matching the 230 µs differential update example—and slash CPU time."
          references: ["differential_dataflow_readme"]
        - operator: "CDC merge / Delta Lake change scan"
          alpha_estimate: 0.9
          overlap_metric: "`changed_rows / total_rows` per `_commit_version` window"
          economic_signal: "With Delta CDF, only 10 % of rows typically reprocess for append-heavy feeds, so reuse receipts can promise ≥40 % compute savings."
          references: ["delta_lake_cdf"]
        - operator: "Chunked deduplication (FastCDC)"
          alpha_estimate: 0.8
          overlap_metric: "Chunk-level MinHash similarity over Rabin windows"
          economic_signal: "FastCDC’s 10× speedup over Rabin hashing allows aggressive chunk reuse without CPU burn, raising α for large binary blobs."
          references: ["fastcdc_usenix16", "minhash_wiki"]
        - operator: "Ray Data streaming GPU batches"
          alpha_estimate: 0.7
          overlap_metric: "Fraction of GPU-bound batches served from cached CPU transformations"
          economic_signal: "Streaming CPU→GPU transfer keeps accelerators ≥70 % utilized, so reusing preprocessed blocks saves GPU rent immediately."
          references: ["ray_data_docs"]
        - operator: "Dagster partitioned assets"
          alpha_estimate: 0.75
          overlap_metric: "Partitions reused vs total (capped at 100 000 per asset)"
          economic_signal: "Partition awareness lets Northroot skip 3⁄4 of partitions on steady-state jobs, matching Dagster’s incremental scheduling guidance."
          references: ["dagster_partition_guide"]
    integration_notes: |
      1. Surface α as a first-class field in `receipts/src/canonical.rs` so every operator receipt carries overlap evidence, and wire it through `receipts/tests/test_drift_detection.rs` to fail when α drops below negotiated thresholds.
      2. Extend `crates/northroot-engine/src/lib.rs` with a `ReuseIndexed` trait that exposes `fn overlap(&self) -> OverlapMetric` so strategies (e.g., `strategies/incremental_sum.rs`) can emit both outputs and reuse metadata without double passes.
      3. Teach `engine/src/commitments.rs` to accept deterministic CBOR blobs (per RFC 8949) and optionally mirrored JCS JSON bodies so cross-org verifiers can recompute roots byte-for-byte.
      4. Package operator manifests (method/data/reasoning shapes) with Bazel-style cache keys: hash of canonical inputs, operator id, α, ΔC. When a cache hit occurs (from Bazel, DVC, Dagster, Ray), create a Northroot receipt instead of silently skipping work.
      5. For FinOps pilots, bind receipts to `receipts/schemas/spend_schema.json` and store MinHash sketches that prove two billing runs reused ≥80 % of the graph; emit drift alerts in `test_drift_detection.rs` when sketches diverge.
    proof_synergy_memo: |
      Deterministic serialization is the bridge between delta reuse and verifiable proofs. RFC 8949 mandates preferred argument sizes, forbids indefinite-length items, and enforces lexicographically sorted map keys, so CBOR receipts can be hashed identically by every verifier ([cbor_rfc8949]). RFC 8785 requires I-JSON compliant payloads with deterministic property ordering and ECMAScript-consistent number formatting so JSON mirrors stay hashable ([jcs_rfc8785]). Pairing those encodings with FastCDC chunk IDs and Bazel/DVC cache keys means a single receipt can cite: (a) the subset of content-defined chunks reused, (b) the α/ΔC pair for the operator, and (c) the deterministic digest that auditors recompute without access to proprietary data. This unlocks verifiable delta compute both inside TEEs (where deterministic binary blobs are crucial) and in zk-proof experiments, because the canonical receipts become the public inputs to proof circuits without leaking side-channel variance.
    white_space_matrix:
      - quadrant: "High pain / high reuse potential"
        opportunity: "Cross-cloud FinOps drift remediation"
        description: "Large FinOps teams waste 32 % of spend yet lack verifiable reuse proofs; Northroot receipts + MinHash sketches validate α>0.8 before approving reruns."
        references: ["cloudzero_finops_stats", "minhash_wiki"]
      - quadrant: "High pain / low current reuse"
        opportunity: "GPU-heavy agent pipelines"
        description: "Ray Data keeps GPUs hot, but most orgs lack cache-aware receipts; introducing Northroot manifests here offers fast wins but requires deeper integration work."
        references: ["ray_data_docs"]
      - quadrant: "Low pain / high reuse potential"
        opportunity: "Lakehouse incremental ETL"
        description: "Delta CDF already exposes change slices, so adopting receipts is lightweight and yields immediate α≈0.9 without major refactors."
        references: ["delta_lake_cdf"]
      - quadrant: "Low pain / low reuse today"
        opportunity: "Inter-org settlement proofs"
        description: "Canonical CBOR/JCS receipts remove redundant compliance reruns even though current pain is moderate; once adopted, reuse proofs become portable assets."
        references: ["cbor_rfc8949", "jcs_rfc8785"]
  bibliography:
    - id: "differential_dataflow_readme"
      title: "Differential Dataflow README"
      url: "https://github.com/TimelyDataflow/differential-dataflow/blob/master/README.md"
      excerpt: "Shows hierarchical scopes, code examples, and empirical evidence where incremental updates complete in hundreds of microseconds after a 15 s initial run."
    - id: "ray_data_docs"
      title: "Ray Data: Scalable Datasets for ML"
      url: "https://docs.ray.io/en/latest/data/dataset.html"
      excerpt: "Explains streaming execution that keeps GPUs utilized, multi-modal format support, and AI-friendly integrations."
    - id: "delta_lake_cdf"
      title: "Delta Lake Change Data Feed"
      url: "https://docs.delta.io/latest/delta-change-data-feed.html"
      excerpt: "Details `_change_type`, `_commit_version`, and how to read change data in batch/streaming ETL jobs."
    - id: "bazel_remote_cache"
      title: "Bazel Remote Caching"
      url: "https://bazel.build/docs/remote-caching"
      excerpt: "Describes action-cache semantics, CAS layout, and how builds reuse artifacts across developers and CI."
    - id: "fastcdc_usenix16"
      title: "FastCDC: a Fast and Efficient Content-Defined Chunking Approach for Data Deduplication"
      url: "https://www.usenix.org/system/files/conference/atc16/atc16-paper-xia.pdf"
      excerpt: "Reports 10× faster throughput than Rabin-based CDC while maintaining dedup ratios."
    - id: "dagster_partition_guide"
      title: "Dagster Partitioning Assets Guide"
      url: "https://docs.dagster.io/guides/build/partitions-and-backfills/partitioning-assets"
      excerpt: "Shows how time/static/dynamic partitions enable incremental runs and recommends ≤100 000 partitions per asset."
    - id: "dvc_readme"
      title: "DVC Project README"
      url: "https://github.com/iterative/dvc/blob/main/README.rst"
      excerpt: "Highlights ‘run only the steps impacted by changes’ and experiment/remote cache workflows."
    - id: "cloudzero_finops_stats"
      title: "CloudZero FinOps Statistics (2023)"
      url: "https://www.cloudzero.com/blog/finops-statistics/"
      excerpt: "Aggregates FinOps survey data: 32 % spend waste, 82 % of orgs now have FinOps teams, and maturity stages."
    - id: "minhash_wiki"
      title: "MinHash"
      url: "https://en.wikipedia.org/wiki/MinHash"
      excerpt: "Defines the MinHash estimator for the Jaccard index, enabling quick overlap comparison."
    - id: "cbor_rfc8949"
      title: "RFC 8949: Concise Binary Object Representation (CBOR)"
      url: "https://www.rfc-editor.org/rfc/rfc8949.html"
      excerpt: "Specifies deterministic encoding rules (preferred argument sizes, no indefinite-length items, sorted keys)."
    - id: "jcs_rfc8785"
      title: "RFC 8785: JSON Canonicalization Scheme"
      url: "https://www.rfc-editor.org/rfc/rfc8785.html"
      excerpt: "Defines deterministic property sorting and strict serialization for hash/sign friendly JSON."
