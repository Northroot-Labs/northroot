name: ci
on: [push, pull_request]
jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: dtolnay/rust-toolchain@stable
            - name: Build & Test
              run: |
                  cargo fmt --all -- --check
                  cargo clippy --all -- -D warnings
                  cargo test --all --all-features
            - name: Test Vector Integrity
              run: |
                  echo "🔍 Checking test vector integrity..."
                  cargo test -p northroot-receipts --test test_vector_integrity -- --nocapture
                  cargo test -p northroot-receipts --test test_drift_detection -- --nocapture
                  echo "🔍 Checking engine test vector integrity..."
                  cargo test -p northroot-engine --test test_engine_vector_integrity -- --nocapture
                  cargo test -p northroot-engine --test test_composition_vector_roundtrip -- --nocapture
                  cargo test -p northroot-engine --test test_drift_detection -- --nocapture
            - name: Integrity Check
              env:
                  CI: "true"
                  GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
                  GITHUB_SHA: ${{ github.sha }}
              run: |
                  echo "🛡️  Running integrity checks..."
                  bash scripts/check-integrity.sh
            - name: Verify Vector Files Exist
              run: |
                  echo "📋 Verifying all required vector files exist..."
                  required_vectors=(
                      "vectors/data_shape.json"
                      "vectors/method_shape.json"
                      "vectors/reasoning_shape.json"
                      "vectors/execution.json"
                      "vectors/spend.json"
                      "vectors/settlement.json"
                  )
                  missing=0
                  for vector in "${required_vectors[@]}"; do
                      if [ ! -f "$vector" ]; then
                          echo "❌ Missing required vector: $vector"
                          missing=1
                      fi
                  done
                  if [ $missing -eq 1 ]; then
                      echo ""
                      echo "ERROR: Required test vectors are missing!"
                      echo "Run: cargo test --test regenerate_vectors -- --ignored --nocapture"
                      exit 1
                  fi
                  echo "✅ All required vector files present"
