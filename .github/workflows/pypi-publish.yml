name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      testpypi:
        description: "Publish to TestPyPI instead of PyPI"
        required: false
        type: boolean
        default: false

jobs:
  build-wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
        exclude:
          # Reduce matrix size - build Python 3.12 on all platforms, others on Linux only
          - os: macos-latest
            python-version: "3.10"
          - os: macos-latest
            python-version: "3.11"
          - os: windows-latest
            python-version: "3.10"
          - os: windows-latest
            python-version: "3.11"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install maturin
        run: |
          pip install --upgrade pip
          pip install maturin

      - name: Build wheel (Linux/Windows)
        if: runner.os != 'macOS'
        working-directory: sdk/python/northroot
        run: |
          maturin build --release --out dist
          # Ensure dist directory exists and has wheels
          mkdir -p dist
          # Copy wheels from target/wheels if they exist (fallback)
          if [ -d target/wheels ] && [ -n "$(ls -A target/wheels/*.whl 2>/dev/null)" ]; then
            cp target/wheels/*.whl dist/ 2>/dev/null || true
          fi

      - name: Build wheel (macOS)
        if: runner.os == 'macOS'
        working-directory: sdk/python/northroot
        run: |
          # Build for native architecture (GitHub macOS runners are Apple Silicon)
          # For Universal2 support, we'd need to build both architectures and merge
          # For now, building native architecture - users on other arch can build from source
          maturin build --release --out dist
          # Ensure dist directory exists and has wheels
          mkdir -p dist
          # Copy wheels from target/wheels if they exist (fallback)
          if [ -d target/wheels ] && [ -n "$(ls -A target/wheels/*.whl 2>/dev/null)" ]; then
            cp target/wheels/*.whl dist/ 2>/dev/null || true
          fi

      - name: List build artifacts
        working-directory: sdk/python/northroot
        run: |
          echo "=== Build artifacts in dist/ ==="
          ls -lah dist/*.whl 2>/dev/null || echo "No wheels in dist/"
          echo ""
          echo "=== Build artifacts in target/wheels/ ==="
          ls -lah target/wheels/*.whl 2>/dev/null || echo "No wheels in target/wheels/"
          echo ""
          echo "=== Verifying at least one wheel exists ==="
          FOUND_WHEEL=false
          if [ -n "$(find dist -name '*.whl' -type f 2>/dev/null | head -1)" ]; then
            FOUND_WHEEL=true
          fi
          if [ -n "$(find target/wheels -name '*.whl' -type f 2>/dev/null | head -1)" ]; then
            FOUND_WHEEL=true
          fi
          if [ "$FOUND_WHEEL" = "false" ]; then
            echo "❌ ERROR: No wheel files found in either location!"
            exit 1
          else
            echo "✅ Wheel file(s) found"
          fi

      - name: Verify wheel (Unix)
        if: runner.os != 'Windows'
        working-directory: sdk/python/northroot
        shell: bash
        run: |
          # Find the built wheel file (use find to avoid glob expansion issues)
          WHEEL_FILE=$(find dist -name '*.whl' -type f 2>/dev/null | head -1)
          if [ -z "$WHEEL_FILE" ]; then
            WHEEL_FILE=$(find target/wheels -name '*.whl' -type f 2>/dev/null | head -1)
          fi
          
          if [ -z "$WHEEL_FILE" ]; then
            echo "❌ No wheel file found"
            exit 1
          fi
          
          echo "Found wheel: $WHEEL_FILE"
          pip install "$WHEEL_FILE" --force-reinstall --no-deps
          python -c "from northroot import Client; print('✅ Package imports successfully')"

      - name: Verify wheel (Windows)
        if: runner.os == 'Windows'
        working-directory: sdk/python/northroot
        shell: pwsh
        run: |
          # Find the built wheel file
          $wheelFile = Get-ChildItem -Path target/wheels/*.whl -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $wheelFile) {
            $wheelFile = Get-ChildItem -Path dist/*.whl -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          
          if (-not $wheelFile) {
            Write-Host "❌ No wheel file found"
            exit 1
          }
          
          Write-Host "Found wheel: $($wheelFile.FullName)"
          pip install $wheelFile.FullName --force-reinstall --no-deps
          python -c "from northroot import Client; print('✅ Package imports successfully')"

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-py${{ matrix.python-version }}
          path: |
            sdk/python/northroot/dist/*.whl
            sdk/python/northroot/target/wheels/*.whl
          retention-days: 7
          if-no-files-found: warn

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin
        run: |
          pip install --upgrade pip
          pip install maturin

      - name: Build source distribution
        working-directory: sdk/python/northroot
        run: |
          maturin sdist --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: sdk/python/northroot/dist/*.tar.gz
          retention-days: 7
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    # Optional: Add environment protection (uncomment and configure in GitHub Settings)
    # environment:
    #   name: pypi
    #   url: https://pypi.org/project/northroot/

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist/wheels
          merge-multiple: true

      - name: Download source distribution
        uses: actions/download-artifact@v4
        with:
          pattern: sdist
          path: dist/sdist
          merge-multiple: true

      - name: List all artifacts
        run: |
          echo "=== Wheels ==="
          find dist/wheels -name "*.whl" -type f || echo "No wheels found"
          echo ""
          echo "=== Source distributions ==="
          find dist/sdist -name "*.tar.gz" -type f || echo "No sdist found"

      - name: Verify and prepare TestPyPI token
        if: ${{ inputs.testpypi == true }}
        run: |
          if [ -z "${{ secrets.TESTPYPI_API_TOKEN }}" ]; then
            echo "❌ TESTPYPI_API_TOKEN secret is not set"
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          TOKEN_LENGTH=$(echo -n "${{ secrets.TESTPYPI_API_TOKEN }}" | wc -c)
          echo "✅ Token is set (length: $TOKEN_LENGTH characters)"

      - name: Verify and prepare PyPI token
        if: ${{ inputs.testpypi != true }}
        run: |
          if [ -z "${{ secrets.PYPI_API_TOKEN }}" ]; then
            echo "❌ PYPI_API_TOKEN secret is not set"
            echo "Go to: Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          TOKEN_LENGTH=$(echo -n "${{ secrets.PYPI_API_TOKEN }}" | wc -c)
          echo "✅ Token is set (length: $TOKEN_LENGTH characters)"

      - name: Install twine
        run: |
          pip install --upgrade pip
          pip install twine

      - name: Publish to TestPyPI
        if: ${{ inputs.testpypi == true }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: |
          # Strip whitespace/newlines from token
          CLEAN_TOKEN=$(echo -n "$TWINE_PASSWORD" | tr -d '\n\r\t ')
          export TWINE_PASSWORD="$CLEAN_TOKEN"

          echo "Publishing to TestPyPI..."
          echo "Token length: ${#CLEAN_TOKEN} characters"

          # Collect all wheels and sdist
          WHEELS=$(find dist/wheels -name "*.whl" -type f)
          SDIST=$(find dist/sdist -name "*.tar.gz" -type f | head -1)

          if [ -z "$WHEELS" ] && [ -z "$SDIST" ]; then
            echo "❌ No wheels or source distribution found"
            exit 1
          fi

          # Upload all artifacts
          if [ -n "$SDIST" ]; then
            twine upload --repository testpypi "$SDIST"
          fi
          if [ -n "$WHEELS" ]; then
            echo "$WHEELS" | xargs -n1 twine upload --repository testpypi
          fi

      - name: Publish to PyPI
        if: ${{ inputs.testpypi != true }}
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          # Strip whitespace/newlines from token
          CLEAN_TOKEN=$(echo -n "$TWINE_PASSWORD" | tr -d '\n\r\t ')
          export TWINE_PASSWORD="$CLEAN_TOKEN"

          echo "Publishing to PyPI..."
          echo "Token length: ${#CLEAN_TOKEN} characters"

          # Collect all wheels and sdist
          WHEELS=$(find dist/wheels -name "*.whl" -type f)
          SDIST=$(find dist/sdist -name "*.tar.gz" -type f | head -1)

          if [ -z "$WHEELS" ] && [ -z "$SDIST" ]; then
            echo "❌ No wheels or source distribution found"
            exit 1
          fi

          # Upload all artifacts together (twine handles multiple files)
          FILES=""
          if [ -n "$SDIST" ]; then
            FILES="$SDIST"
          fi
          if [ -n "$WHEELS" ]; then
            FILES="$FILES $(echo "$WHEELS" | tr '\n' ' ')"
          fi

          echo "Uploading files:"
          echo "$FILES" | tr ' ' '\n' | grep -v '^$'
          
          twine upload $FILES

      - name: Upload all artifacts (backup)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: all-wheels-and-sdist
          path: |
            dist/wheels/**/*.whl
            dist/sdist/**/*.tar.gz
          retention-days: 30
          if-no-files-found: warn
