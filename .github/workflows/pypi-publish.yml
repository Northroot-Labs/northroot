name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      testpypi:
        description: "Publish to TestPyPI instead of PyPI"
        required: false
        type: boolean
        default: false

jobs:
  publish:
    name: Build and Publish Python Package
    runs-on: ubuntu-latest
    # Optional: Add environment protection (uncomment and configure in GitHub Settings)
    # environment:
    #   name: pypi
    #   url: https://pypi.org/project/northroot/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin
        run: |
          pip install --upgrade pip
          pip install maturin

      - name: Build package
        working-directory: sdk/python/northroot
        run: |
          maturin build --release

      - name: List build artifacts
        working-directory: sdk/python/northroot
        run: |
          echo "Build artifacts:"
          ls -lah dist/ || echo "dist/ directory does not exist"

      - name: Verify wheel
        working-directory: sdk/python/northroot
        run: |
          # Find the built wheel file
          WHEEL_FILE=$(ls dist/*.whl 2>/dev/null | head -1)
          if [ -z "$WHEEL_FILE" ]; then
            echo "❌ No wheel file found in dist/"
            ls -la dist/ || echo "dist/ directory does not exist"
            exit 1
          fi
          echo "Found wheel: $WHEEL_FILE"
          pip install "$WHEEL_FILE"
          python -c "from northroot import Client; print('✅ Package imports successfully')"

      - name: Publish to TestPyPI
        if: ${{ inputs.testpypi == true }}
        working-directory: sdk/python/northroot
        env:
          MATURIN_PASSWORD: ${{ secrets.TESTPYPI_API_TOKEN }}
        run: |
          maturin publish --repository testpypi --username __token__

      - name: Publish to PyPI
        if: ${{ inputs.testpypi != true }}
        working-directory: sdk/python/northroot
        env:
          MATURIN_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          maturin publish --username __token__

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: wheels
          path: sdk/python/northroot/dist/*.whl
          retention-days: 30
          if-no-files-found: warn
