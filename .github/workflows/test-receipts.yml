name: Test Receipt Recording

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/test-receipts.yml'

jobs:
  test-receipts:
    name: Test receipt recording on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install northroot
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install northroot || {
            echo "[WARN] Failed to install northroot from PyPI"
            exit 0
          }
          # Debug: Check where it was installed
          echo "=== Package Info ==="
          python3 -m pip show northroot || echo "[WARN] pip show failed"
          echo ""
          echo "=== Python Info ==="
          python3 -c "import sys; print('Python version:', sys.version); print('Python executable:', sys.executable); print('Python path:', sys.path)" || echo "[WARN] sys.path check failed"
          echo ""
          echo "=== Package Files ==="
          python3 -c "import site; import os; print('Site packages:', site.getsitepackages()); print('User site:', site.getusersitepackages())" || echo "[WARN] site check failed"
          echo ""
          # Check if package files exist
          python3 << 'PYEOF'
          import site
          import os
          import sys
          
          # Find where packages are installed
          for path in sys.path:
              northroot_path = os.path.join(path, 'northroot')
              if os.path.exists(northroot_path):
                  print(f'[OK] Found northroot at: {northroot_path}')
                  # List contents
                  try:
                      contents = os.listdir(northroot_path)
                      print(f'[OK] Contents: {contents}')
                  except:
                      pass
                  break
          else:
              print('[WARN] northroot directory not found in sys.path')
              print(f'[INFO] Searched paths: {sys.path}')
          PYEOF
          echo ""
          # Verify installation with better error handling
          echo "=== Import Test ==="
          python3 << 'PYEOF'
          import sys
          try:
              import northroot
              print('[OK] northroot imported successfully')
              print(f'[OK] northroot location: {northroot.__file__}')
          except ImportError as e:
              print(f'[ERROR] ImportError: {e}')
              print(f'[ERROR] Python version: {sys.version}')
              print(f'[ERROR] Python executable: {sys.executable}')
              import traceback
              traceback.print_exc()
              sys.exit(1)
          except Exception as e:
              print(f'[ERROR] Unexpected error: {e}')
              import traceback
              traceback.print_exc()
              sys.exit(1)
          PYEOF
        continue-on-error: true

      - name: Setup receipt storage
        shell: bash
        run: |
          mkdir -p ./receipts
          echo "RECEIPT_STORAGE=./receipts" >> $GITHUB_ENV

      - name: Record workflow intent
        if: always()
        shell: bash
        run: |
          # Verify northroot is available
          python3 -c "import northroot; print('[OK] northroot available')" || {
            echo "[SKIP] northroot not available - skipping receipt recording"
            exit 0
          }
          
          python3 << 'PYEOF'
          import json
          import os
          import sys
          
          try:
              from northroot import Client
              print('[OK] Successfully imported northroot.Client')
              
              storage = os.environ.get('RECEIPT_STORAGE', './receipts')
              os.makedirs(storage, exist_ok=True)
              client = Client(storage_path=storage)
              
              run_id = os.environ.get('GITHUB_RUN_ID', 'unknown')
              workflow = os.environ.get('GITHUB_WORKFLOW', 'unknown')
              job_name = os.environ.get('GITHUB_JOB', 'unknown')
              platform = os.environ.get('RUNNER_OS', 'unknown')
              event_name = os.environ.get('GITHUB_EVENT_NAME', 'unknown')
              commit_sha = os.environ.get('GITHUB_SHA', 'unknown')
              
              payload = {
                  'step': 'workflow-intent',
                  'status': 'intent',  # Not executed yet
                  'workflow': workflow,
                  'job': job_name,
                  'platform': platform,
                  'run_id': run_id,
                  'event': event_name,
                  'commit': commit_sha,
                  'test': True
              }
              
              receipt = client.record_work(
                  workload_id='workflow-intent',
                  payload=payload,
                  trace_id=f'run-{run_id}',
                  tags=['ci', 'github-actions', workflow, 'intent']
              )
              
              try:
                  client.store_receipt(receipt)
                  print(f'[OK] Stored intent receipt to: {storage}')
              except Exception as store_err:
                  receipt_json = receipt.to_json()
                  receipt_file = os.path.join(storage, f'{receipt.get_rid()}.json')
                  with open(receipt_file, 'w') as f:
                      f.write(receipt_json)
                  print(f'[OK] Saved intent receipt JSON: {receipt_file}')
              
              print(f'[OK] Recorded intent receipt: {receipt.get_rid()}')
              print(f'[OK] Trace ID: run-{run_id}')
          except ImportError:
              print('[SKIP] northroot not available - install may have failed')
              sys.exit(0)
          except Exception as e:
              print(f'[WARN] Intent receipt failed: {str(e)}')
              import traceback
              traceback.print_exc()
              sys.exit(0)
          PYEOF
        continue-on-error: true
        env:
          RECEIPT_STORAGE: ./receipts

      - name: Record workflow start
        if: always()
        shell: bash
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import sys
          
          try:
              from northroot import Client
              
              storage = os.environ.get('RECEIPT_STORAGE', None)
              if not storage:
                  print('[WARN] RECEIPT_STORAGE not set, using default')
                  storage = './receipts'
              
              # Ensure storage directory exists
              os.makedirs(storage, exist_ok=True)
              
              client = Client(storage_path=storage)
              
              run_id = os.environ.get('GITHUB_RUN_ID', 'unknown')
              workflow = os.environ.get('GITHUB_WORKFLOW', 'unknown')
              job_name = os.environ.get('GITHUB_JOB', 'unknown')
              platform = os.environ.get('RUNNER_OS', 'unknown')
              
              payload = {
                  'step': 'start',
                  'status': 'in_progress',
                  'workflow': workflow,
                  'job': job_name,
                  'platform': platform,
                  'run_id': run_id,
                  'test': True
              }
              
              receipt = client.record_work(
                  workload_id='test-workflow',
                  payload=payload,
                  trace_id=f'run-{run_id}',
                  tags=['ci', 'github-actions', workflow, job_name]
              )
              
              # Always try to store receipt
              try:
                  client.store_receipt(receipt)
                  print(f'[OK] Stored receipt to: {storage}')
              except Exception as store_err:
                  print(f'[WARN] Storage failed: {store_err}')
                  # Still save receipt JSON as fallback
                  receipt_json = receipt.to_json()
                  receipt_file = os.path.join(storage, f'{receipt.get_rid()}.json')
                  with open(receipt_file, 'w') as f:
                      f.write(receipt_json)
                  print(f'[OK] Saved receipt JSON: {receipt_file}')
              
              print(f'[OK] Recorded receipt: {receipt.get_rid()}')
              print(f'[OK] Trace ID: run-{run_id}')
          except ImportError:
              print('[SKIP] northroot not available - install may have failed')
              sys.exit(0)
          except Exception as e:
              print(f'[WARN] Receipt recording failed: {str(e)}')
              import traceback
              traceback.print_exc()
              sys.exit(0)
          PYEOF
        continue-on-error: true
        env:
          RECEIPT_STORAGE: ./receipts

      - name: Simulate build step
        shell: bash
        run: |
          echo "Simulating build process..."
          sleep 2
          echo "Build complete"

      - name: Record build completion
        if: always()
        shell: bash
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import sys
          
          try:
              from northroot import Client
              
              storage = os.environ.get('RECEIPT_STORAGE', './receipts')
              os.makedirs(storage, exist_ok=True)
              client = Client(storage_path=storage)
              
              run_id = os.environ.get('GITHUB_RUN_ID', 'unknown')
              job_status = os.environ.get('JOB_STATUS', 'unknown')
              platform = os.environ.get('RUNNER_OS', 'unknown')
              build_exit_code = os.environ.get('BUILD_EXIT_CODE', '0')
              
              # Capture error info if failed
              error_info = None
              if job_status == 'failure':
                  error_info = {
                      'exit_code': build_exit_code,
                      'failed': True,
                      'message': 'Build step failed'
                  }
              
              payload = {
                  'step': 'build-complete',
                  'status': job_status,
                  'platform': platform,
                  'run_id': run_id,
                  'duration_sec': 2,
                  'error': error_info
              }
              
              receipt = client.record_work(
                  workload_id='test-build',
                  payload=payload,
                  trace_id=f'run-{run_id}',
                  tags=['ci', 'github-actions', 'build']
              )
              
              try:
                  client.store_receipt(receipt)
                  print(f'[OK] Stored receipt to: {storage}')
              except Exception as store_err:
                  receipt_json = receipt.to_json()
                  receipt_file = os.path.join(storage, f'{receipt.get_rid()}.json')
                  with open(receipt_file, 'w') as f:
                      f.write(receipt_json)
                  print(f'[OK] Saved receipt JSON: {receipt_file}')
              
              status_emoji = '[FAIL]' if job_status == 'failure' else '[OK]'
              print(f'{status_emoji} Recorded receipt: {receipt.get_rid()} (status: {job_status})')
          except ImportError:
              print('[SKIP] northroot not available - install may have failed')
              sys.exit(0)
          except Exception as e:
              print(f'[WARN] Receipt recording failed: {str(e)}')
              import traceback
              traceback.print_exc()
              sys.exit(0)
          PYEOF
        continue-on-error: true
        env:
          RECEIPT_STORAGE: ./receipts
          JOB_STATUS: ${{ job.status }}
          BUILD_EXIT_CODE: ${{ job.status == 'failure' && '1' || '0' }}

      - name: Simulate test step
        shell: bash
        run: |
          echo "Simulating test process..."
          sleep 1
          echo "Tests complete"

      - name: Record test completion
        if: always()
        shell: bash
        run: |
          python3 << 'PYEOF'
          import json
          import os
          import sys
          
          try:
              from northroot import Client
              
              storage = os.environ.get('RECEIPT_STORAGE', './receipts')
              os.makedirs(storage, exist_ok=True)
              client = Client(storage_path=storage)
              
              run_id = os.environ.get('GITHUB_RUN_ID', 'unknown')
              job_status = os.environ.get('JOB_STATUS', 'unknown')
              platform = os.environ.get('RUNNER_OS', 'unknown')
              test_exit_code = os.environ.get('TEST_EXIT_CODE', '0')
              
              # Capture error info if failed
              error_info = None
              if job_status == 'failure':
                  error_info = {
                      'exit_code': test_exit_code,
                      'failed': True,
                      'message': 'Test step failed'
                  }
              
              payload = {
                  'step': 'test-complete',
                  'status': job_status,
                  'platform': platform,
                  'run_id': run_id,
                  'tests_passed': job_status == 'success',
                  'error': error_info
              }
              
              receipt = client.record_work(
                  workload_id='test-test',
                  payload=payload,
                  trace_id=f'run-{run_id}',
                  tags=['ci', 'github-actions', 'test']
              )
              
              try:
                  client.store_receipt(receipt)
                  print(f'[OK] Stored receipt to: {storage}')
              except Exception as store_err:
                  receipt_json = receipt.to_json()
                  receipt_file = os.path.join(storage, f'{receipt.get_rid()}.json')
                  with open(receipt_file, 'w') as f:
                      f.write(receipt_json)
                  print(f'[OK] Saved receipt JSON: {receipt_file}')
              
              status_emoji = '[FAIL]' if job_status == 'failure' else '[OK]'
              print(f'{status_emoji} Recorded receipt: {receipt.get_rid()} (status: {job_status})')
          except ImportError:
              print('[SKIP] northroot not available - install may have failed')
              sys.exit(0)
          except Exception as e:
              print(f'[WARN] Receipt recording failed: {str(e)}')
              import traceback
              traceback.print_exc()
              sys.exit(0)
          PYEOF
        continue-on-error: true
        env:
          RECEIPT_STORAGE: ./receipts
          JOB_STATUS: ${{ job.status }}
          TEST_EXIT_CODE: ${{ job.status == 'failure' && '1' || '0' }}

      - name: Query and verify receipts
        if: always()
        shell: bash
        run: |
          python3 << 'PYEOF'
          import os
          import sys
          
          try:
              from northroot import Client
              
              storage = os.environ.get('RECEIPT_STORAGE', None)
              if not storage:
                  print('[SKIP] No storage configured')
                  sys.exit(0)
              
              client = Client(storage_path=storage)
              run_id = os.environ.get('GITHUB_RUN_ID', 'unknown')
              trace_id = f'run-{run_id}'
              
              print(f'[INFO] Querying receipts for trace_id: {trace_id}')
              
              receipts = client.list_receipts(trace_id=trace_id)
              
              if not receipts:
                  print(f'[WARN] No receipts found for run {run_id}')
                  sys.exit(0)
              
              print(f'[OK] Found {len(receipts)} receipt(s)')
              
              for i, receipt in enumerate(receipts, 1):
                  rid = receipt.get_rid()
                  is_valid = client.verify_receipt(receipt)
                  status = '[OK] Valid' if is_valid else '[FAIL] Invalid'
                  print(f'  Receipt {i}: {rid[:16]}... {status}')
                  
                  try:
                      payload = receipt.get_payload()
                      if isinstance(payload, dict):
                          step = payload.get('step', 'unknown')
                          print(f'    Step: {step}')
                  except:
                      pass
          except ImportError:
              print('[SKIP] northroot not available')
              sys.exit(0)
          except Exception as e:
              print(f'[WARN] Query failed: {str(e)}')
              sys.exit(0)
          PYEOF
        continue-on-error: true
        env:
          RECEIPT_STORAGE: ./receipts

      - name: Upload receipts as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: receipts-test-run-${{ github.run_id }}-${{ matrix.os }}
          path: |
            receipts/*.json
            receipts/*.db
          retention-days: 30
          if-no-files-found: ignore
