[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "northroot-custody"
version = "0.1.0"
description = "Northroot custody contracts, delegated snapshot plans, and steward profile helpers."
requires-python = ">=3.11"
readme = "README.md"
license = { text = "MIT" }

[project.scripts]
nr-custody = "northroot.custody.cli:main"

[tool.setuptools.packages.find]
where = ["src"]
namespaces = true
